<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Note Suite Ultimate</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            
            /* Dynamic Note Customization Variables */
            --note-paper-color: #1e293b;
            --note-font-color: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--bg-secondary);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 85vh;
            position: relative;
        }

        .view {
            display: none;
            flex-direction: column;
            flex: 1;
            padding: 2rem;
        }

        .view.active {
            display: flex;
        }

        /* Home View Styles */
        .home-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .cloud-toolbar {
            display: flex;
            gap: 0.5rem;
            background: rgba(15, 23, 42, 0.4);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 1.5rem;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .cloud-btn-group {
            display: flex;
            gap: 0.5rem;
        }

        .cloud-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .btn {
            background-color: var(--accent);
            color: #0f172a;
            font-weight: 600;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #273549;
            color: var(--text-main);
        }

        .btn-small {
            padding: 0.45rem 0.85rem;
            font-size: 0.8rem;
            border-radius: 6px;
        }

        .tag-section {
            margin-bottom: 2rem;
        }

        .tag-title {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .note-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .note-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .note-card-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-card-snippet {
            font-size: 0.875rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .delete-card-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .note-card:hover .delete-card-btn {
            opacity: 1;
        }

        .delete-card-btn:hover {
            color: #ef4444;
        }

        /* Homepage Creator Footer Layout Box */
        .creator-info-footer {
            margin-top: auto;
            padding: 1.25rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .creator-footer-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }
        .creator-highlight {
            color: var(--accent);
            font-weight: 600;
        }
        .creator-notice {
            font-style: italic;
            text-align: center;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            padding-top: 0.4rem;
            margin-top: 0.4rem;
            color: #34d399;
        }

        /* Note Editor View Styles */
        #editorView {
            background-color: var(--note-paper-color);
            transition: background-color 0.3s ease;
        }

        .editor-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .date-display {
            text-align: right;
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .title-wrapper {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .note-title-input {
            background: transparent;
            border: none;
            color: var(--note-font-color);
            font-size: 1.75rem;
            font-weight: bold;
            text-decoration: underline;
            text-align: center;
            width: 80%;
            outline: none;
            padding: 0.25rem;
            transition: color 0.3s ease;
        }

        /* Rich ContentEditable Workspace */
        .editor-content-area {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--note-font-color);
            font-size: 1.1rem;
            line-height: 1.6;
            outline: none;
            width: 100%;
            min-height: 320px;
            margin-bottom: 1.5rem;
            transition: color 0.3s ease;
            overflow-y: auto;
        }

        .editor-content-area[placeholder]:empty:before {
            content: attr(placeholder);
            color: var(--text-muted);
            font-style: italic;
            cursor: text;
        }

        /* Injected Timeline Separators */
        .timeline-separator {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            margin: 1.5rem 0;
            text-align: center;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 0.5rem;
            display: block;
        }

        /* Tables Formatting */
        .note-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            color: var(--note-font-color);
            border: 1px solid var(--border-color);
        }

        .note-table th, .note-table td {
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.75rem;
            text-align: left;
            min-width: 60px;
        }

        .note-table th {
            background-color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }

        /* Ultra-Minimalist Single Line Footer */
        .editor-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            flex-wrap: wrap;
        }

        .single-line-toolbar {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(15, 23, 42, 0.3);
            padding: 0.35rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .icon-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-main);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: rgba(51, 65, 85, 0.5);
            border-color: var(--border-color);
            transform: translateY(-1px);
        }

        /* Specific contextual actions subtle indicators */
        .icon-btn.btn-wa:hover { background: rgba(34, 197, 94, 0.15); border-color: #22c55e; }
        .icon-btn.btn-mail:hover { background: rgba(244, 63, 94, 0.15); border-color: #f43f5e; }
        .icon-btn.btn-accent:hover { background: rgba(56, 189, 248, 0.15); border-color: var(--accent); }

        .vertical-divider {
            width: 1px;
            height: 24px;
            background-color: var(--border-color);
            margin: 0 0.2rem;
        }

        /* Embedded Compact Color Circle Selectors */
        .inline-color-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0 0.5rem;
        }

        .color-circle-input {
            -webkit-appearance: none;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color-circle-input::-webkit-color-swatch {
            border: 2px solid var(--border-color);
            border-radius: 50%;
            padding: 0;
        }

        .attachments-display {
            margin-bottom: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .attachment-badge {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
        }

        /* Compact Popover Calculator */
        .calc-widget {
            position: fixed;
            bottom: 5rem;
            right: 2rem;
            width: 260px;
            background: #1e293b;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .calc-widget.active {
            display: flex;
        }

        .calc-header {
            background: #0f172a;
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid var(--border-color);
        }

        .calc-close { cursor: pointer; color: var(--text-muted); }
        .calc-close:hover { color: #ef4444; }

        .calc-screen {
            background: #0f172a;
            color: #38bdf8;
            padding: 1rem;
            text-align: right;
            font-size: 1.5rem;
            font-family: monospace;
            border-bottom: 1px solid var(--border-color);
            min-height: 58px;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2px;
            background: var(--border-color);
            padding: 2px;
        }

        .calc-grid button {
            background: #1e293b;
            border: none;
            color: var(--text-main);
            padding: 0.85rem;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .calc-grid button:hover { background: #334155; }
        .calc-grid button.op-btn { color: var(--accent); background: #131c2e; }

        /* Full-screen Fallback Print Preview Modal Overlay */
        .print-preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            color: #000000;
            z-index: 10000;
            display: none;
            flex-direction: column;
            padding: 3rem 2rem;
            overflow-y: auto;
        }
        .print-preview-modal.active {
            display: flex;
        }
        .print-preview-close-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .print-preview-title {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            text-decoration: underline;
            margin-bottom: 1.5rem;
            color: #000000 !important;
        }
        .print-preview-body {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #000000 !important;
        }
        .print-preview-body .note-table {
            color: #000000 !important;
            border-color: #000000 !important;
        }
        .print-preview-body .note-table th, .print-preview-body .note-table td {
            border-color: #000000 !important;
        }
        .print-preview-body .timeline-separator {
            color: #475569 !important;
            border-bottom-color: #475569 !important;
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            padding: 3rem;
            font-style: italic;
        }

        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .container, .print-preview-close-btn { display: none !important; }
            .print-preview-modal { display: flex !important; position: static !important; width: 100% !important; height: auto !important; padding: 0 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="homeView" class="view active">
        <div class="home-header">
            <h1>Personal Notebook</h1>
            <button class="btn" onclick="openNewNoteView()">📝 Write New Note</button>
        </div>

        <div class="cloud-toolbar">
            <span class="cloud-label">📂 Google Drive Cloud Integration:</span>
            <div class="cloud-btn-group">
                <button class="btn btn-secondary btn-small" onclick="autoUploadAllNotesToDrive()" style="border-color: var(--accent); color: var(--accent); font-weight: bold;">☁️ Direct Auto-Upload to Drive</button>
                <button class="btn btn-secondary btn-small" onclick="directRestoreFromDriveOrLocal()">📂 Direct Restore from Drive / Local</button>
            </div>
        </div>

        <div id="notesContainer"></div>

        <div class="creator-info-footer">
            <div class="creator-footer-row">
                <div>👨‍💻 Creator: <span class="creator-highlight">Jion</span></div>
                <div>📧 Contact: <span class="creator-highlight">jioniut@gmail.com</span></div>
            </div>
            <div class="creator-footer-row">
                <div>💸 bKash No: <span class="creator-highlight">01717082678</span> (Personal)</div>
            </div>
            <div class="creator-notice">
                "The app is free, you can use it, no ads and no demand"
            </div>
        </div>
    </div>

    <div id="editorView" class="view">
        <div class="editor-top-bar">
            <button class="btn btn-secondary" onclick="saveAndGoHome()">← Back</button>
            <div class="date-display" id="currentDateDisplay"></div>
        </div>

        <div class="title-wrapper">
            <input type="text" id="noteTitle" class="note-title-input" placeholder="Untitled Note">
        </div>

        <div id="noteContent" class="editor-content-area" contenteditable="true" placeholder="Start writing something... Add #tags to organize them automatically on your dashboard." onkeyup="handleContentTyping(event)"></div>

        <div id="attachmentsContainer" class="attachments-display"></div>

        <div class="editor-footer">
            <div class="single-line-toolbar">
                <button class="icon-btn" onclick="triggerVoiceNote()" title="Voice Note">🎙️</button>
                <button class="icon-btn" onclick="triggerImageAttachment()" title="Attach Image">🖼️</button>
                <button class="icon-btn" onclick="triggerLinkAttachment()" title="Attach Link">🔗</button>
                <button class="icon-btn btn-accent" onclick="insertTableWidget()" title="Add Table">📊</button>
                
                <div class="vertical-divider"></div>
                
                <button class="icon-btn" onclick="printActiveNote()" title="Print Note">🖨️</button>
                <button class="icon-btn" onclick="toggleCalculator()" title="Calculator">🧮</button>
                
                <div class="vertical-divider"></div>
                
                <button class="icon-btn btn-mail" onclick="shareViaEmail()" title="Share via Email">✉️</button>
                <button class="icon-btn btn-wa" onclick="shareViaWhatsApp()" title="Share via WhatsApp">💬</button>
                
                <div class="vertical-divider"></div>
                
                <div class="inline-color-wrapper">
                    <input type="color" id="paperColorPicker" class="color-circle-input" value="#1e293b" oninput="applyWorkspaceColors()" title="Page Background Color">
                    <input type="color" id="fontColorPicker" class="color-circle-input" value="#f8fafc" oninput="applyWorkspaceColors()" title="Text Font Color">
                </div>
            </div>

            <button class="btn" onclick="saveAndGoHome()">Save & Close</button>
        </div>
    </div>
</div>

<div id="calcWidget" class="calc-widget">
    <div class="calc-header">
        <span>Utility Calculator</span>
        <span class="calc-close" onclick="toggleCalculator()">✕</span>
    </div>
    <div id="calcScreen" class="calc-screen">0</div>
    <div class="calc-grid">
        <button class="op-btn" onclick="clearCalc()">C</button>
        <button class="op-btn" onclick="inputCalcOp('/')">/</button>
        <button class="op-btn" onclick="inputCalcOp('*')">*</button>
        <button class="op-btn" onclick="inputCalcOp('-')">-</button>
        <button onclick="inputCalcNum('7')">7</button>
        <button onclick="inputCalcNum('8')">8</button>
        <button onclick="inputCalcNum('9')">9</button>
        <button class="op-btn" onclick="inputCalcOp('+')">+</button>
        <button onclick="inputCalcNum('4')">4</button>
        <button onclick="inputCalcNum('5')">5</button>
        <button onclick="inputCalcNum('6')">6</button>
        <button class="op-btn" onclick="calculateResult()">=</button>
        <button onclick="inputCalcNum('1')">1</button>
        <button onclick="inputCalcNum('2')">2</button>
        <button onclick="inputCalcNum('3')">3</button>
        <button onclick="inputCalcNum('0')" style="grid-column: span 2;">0</button>
        <button onclick="inputCalcNum('.')">.</button>
    </div>
</div>

<div id="printPreviewModal" class="print-preview-modal">
    <button class="print-preview-close-btn" onclick="closePrintPreview()">✕ Close Preview</button>
    <div id="printModalDate" style="text-align: right; font-weight: 500; font-size: 0.95rem; margin-bottom: 0.5rem;"></div>
    <div id="printModalTitle" class="print-preview-title"></div>
    <div id="printModalContent" class="print-preview-body"></div>
</div>

<script>
    let appState = {
        notes: JSON.parse(localStorage.getItem('sleek_notes_pro_v15')) || [],
        currentNoteId: null,
        lastInteractionDate: null
    };

    // Live Recording Engine Configuration Variables
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    function getFormattedDate() {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date().toLocaleDateString('en-US', options);
    }

    function initHome() {
        const container = document.getElementById('notesContainer');
        container.innerHTML = '';

        if (appState.notes.length === 0) {
            container.innerHTML = `<div class="empty-state">No notes found. Create your first note above!</div>`;
            return;
        }

        let groupedNotes = { 'Uncategorized': [] };

        appState.notes.forEach(note => {
            const hashtagRegex = /#(\w+)/g;
            const cleanText = note.content.replace(/<[^>]*>/g, ' ');
            let matches = [...cleanText.matchAll(hashtagRegex)];
            
            if (matches.length === 0) {
                groupedNotes['Uncategorized'].push(note);
            } else {
                let uniqueTags = [...new Set(matches.map(m => m[1]))];
                uniqueTags.forEach(tag => {
                    if (!groupedNotes[tag]) groupedNotes[tag] = [];
                    groupedNotes[tag].push(note);
                });
            }
        });

        for (let category in groupedNotes) {
            if (groupedNotes[category].length === 0) continue;

            const section = document.createElement('div');
            section.className = 'tag-section';

            const heading = document.createElement('div');
            heading.className = 'tag-title';
            heading.innerHTML = category === 'Uncategorized' ? `📂 Uncategorized` : `🏷️ #${category}`;
            section.appendChild(heading);

            const grid = document.createElement('div');
            grid.className = 'notes-grid';

            groupedNotes[category].forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = () => openExistingNoteView(note.id);

                let tempDiv = document.createElement('div');
                tempDiv.innerHTML = note.content;
                let rawText = tempDiv.textContent || tempDiv.innerText || '';
                const textSnippet = rawText.replace(/#\w+/g, '').trim();

                card.innerHTML = `
                    <button class="delete-card-btn" onclick="deleteNote(event, '${note.id}')">🗑️</button>
                    <div class="note-card-title">${note.title || 'Untitled Note'}</div>
                    <div class="note-card-snippet">${textSnippet.substring(0,120) || 'Empty content...'}</div>
                `;
                grid.appendChild(card);
            });

            section.appendChild(grid);
            container.appendChild(section);
        }
    }

    /* MICROPHONE AUDIO RECORDING FRAMEWORK LOGIC */
    function triggerVoiceNote() {
        const voiceBtn = document.querySelector('button[title="Voice Note"]');
        
        if (!isRecording) {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("🎤 Audio recording API is not supported or accessible within this WebView wrapper.");
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = event => {
                        if (event.data.size > 0) audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const fileReader = new FileReader();
                        
                        fileReader.readAsDataURL(audioBlob);
                        fileReader.onloadend = () => {
                            const base64AudioData = fileReader.result;
                            
                            // Embed a full player directly inside the editable content area
                            const inlinePlayerHtml = `<p><br><audio controls src="${base64AudioData}"></audio><br></p>`;
                            const editorWorkspace = document.getElementById('noteContent');
                            editorWorkspace.focus();
                            document.execCommand('insertHTML', false, inlinePlayerHtml);
                            
                            appendAttachmentBadge('🎙️ Audio Note');
                        };
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.innerText = "🛑";
                    voiceBtn.style.color = "#ef4444";
                })
                .catch(err => {
                    console.error(err);
                    alert("🎤 Microphone permission denied. Please grant microphone privileges to use voice notes.");
                });
        } else {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            isRecording = false;
            voiceBtn.innerText = "🎙️";
            voiceBtn.style.color = "";
        }
    }

    /* DIRECT AUTO-UPLOAD TO GOOGLE DRIVE PIPELINE */
    function autoUploadAllNotesToDrive() {
        if (appState.notes.length === 0) {
            alert("⚠️ Your note dataset is empty. Write a note first before running file backups.");
            return;
        }

        const backupBlob = new Blob([JSON.stringify(appState.notes, null, 2)], { type: 'application/json' });
        const backupFileName = `Notebook_Cloud_Backup_${new Date().toISOString().slice(0,10)}.json`;

        alert(`☁️ Processing note backups!\n\nYour backup file will download, and your Google Drive workspace will open right up.\n\nSimply select "Upload" inside Drive to save it.`);

        const downloadAnchor = document.createElement('a');
        downloadAnchor.href = URL.createObjectURL(backupBlob);
        downloadAnchor.download = backupFileName;
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();

        setTimeout(() => {
            window.open('https://drive.google.com/drive/my-drive', '_blank');
        }, 1000);
    }

    /* Direct Drive / System Local File Manager Integration Loader */
    function directRestoreFromDriveOrLocal() {
        const fileSelector = document.createElement('input');
        fileSelector.setAttribute("type", "file");
        fileSelector.setAttribute("accept", ".json");
        
        fileSelector.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsText(file, 'UTF-8');
            
            reader.onload = (readerEvent) => {
                try {
                    const importedData = JSON.parse(readerEvent.target.result);
                    if (Array.isArray(importedData)) {
                        if (confirm("⚠️ Warning: Restoring this file will overwrite your local device workspace notes. Proceed?")) {
                            appState.notes = importedData;
                            localStorage.setItem('sleek_notes_pro_v15', JSON.stringify(appState.notes));
                            initHome();
                            alert("🚀 Success! Notebook state populated and restored perfectly.");
                        }
                    } else { alert("❌ Format error: Selected file backup structure is invalid."); }
                } catch(err) { alert("❌ Failed to parse data contents."); }
            }
        };
        fileSelector.click();
    }

    function openNewNoteView() {
        appState.currentNoteId = 'NOTE-' + Date.now();
        appState.lastInteractionDate = new Date().toDateString();

        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').innerHTML = '';
        document.getElementById('currentDateDisplay').textContent = getFormattedDate();
        document.getElementById('attachmentsContainer').innerHTML = '';
        
        document.getElementById('paperColorPicker').value = '#1e293b';
        document.getElementById('fontColorPicker').value = '#f8fafc';
        applyWorkspaceColors();

        switchView('editorView');
    }

    function openExistingNoteView(id) {
        const note = appState.notes.find(n => n.id === id);
        if (!note) return;

        appState.currentNoteId = note.id;
        appState.lastInteractionDate = new Date().toDateString();

        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteContent').innerHTML = note.content;
        document.getElementById('currentDateDisplay').textContent = note.date;
        
        document.getElementById('paperColorPicker').value = note.paperColor || '#1e293b';
        document.getElementById('fontColorPicker').value = note.fontColor || '#f8fafc';
        applyWorkspaceColors();
        
        renderAttachments(note.attachments || []);
        switchView('editorView');
    }

    function applyWorkspaceColors() {
        const paperColor = document.getElementById('paperColorPicker').value;
        const fontColor = document.getElementById('fontColorPicker').value;
        document.documentElement.style.setProperty('--note-paper-color', paperColor);
        document.documentElement.style.setProperty('--note-font-color', fontColor);
    }

    function handleContentTyping(event) {
        const todayStr = new Date().toDateString();
        
        if (appState.lastInteractionDate && appState.lastInteractionDate !== todayStr) {
            const workspace = document.getElementById('noteContent');
            const separatorHtml = `<div class="timeline-separator" contenteditable="false">✨ Continuous Entry: ${getFormattedDate()}</div><br>`;
            
            workspace.innerHTML += separatorHtml;
            appState.lastInteractionDate = todayStr;
            document.getElementById('currentDateDisplay').textContent = getFormattedDate();
            
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(workspace);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
        }
    }

    function insertTableWidget() {
        const rows = prompt("Enter rows count:", "3");
        const cols = prompt("Enter columns count:", "3");
        if (!rows || !cols || isNaN(rows) || isNaN(cols)) return;

        let tableHtml = '<table class="note-table">';
        for (let i = 0; i < rows; i++) {
            tableHtml += '<tr>';
            for (let j = 0; j < cols; j++) {
                tableHtml += i === 0 ? `<th contenteditable="true">Header</th>` : `<td contenteditable="true">Data</td>`;
            }
            tableHtml += '</tr>';
        }
        tableHtml += '</table><p><br></p>';

        document.getElementById('noteContent').focus();
        document.execCommand('insertHTML', false, tableHtml);
    }

    function printActiveNote() {
        const title = document.getElementById('noteTitle').value || 'Untitled Note';
        const date = document.getElementById('currentDateDisplay').textContent;
        const content = document.getElementById('noteContent').innerHTML;

        document.getElementById('printModalDate').innerText = date;
        document.getElementById('printModalTitle').innerText = title;
        document.getElementById('printModalContent').innerHTML = content;
        document.getElementById('printPreviewModal').classList.add('active');

        try { window.print(); } catch (e) { console.log("Blocked by mobile wrapper container."); }
    }

    function closePrintPreview() { document.getElementById('printPreviewModal').classList.remove('active'); }

    function getCleanNoteText() {
        const title = document.getElementById('noteTitle').value || 'Untitled Note';
        let tempDiv = document.createElement('div');
        tempDiv.innerHTML = document.getElementById('noteContent').innerHTML;
        return `Title: ${title}\n\nContent:\n${tempDiv.textContent || tempDiv.innerText || ''}`;
    }

    function fallbackCopyToClipboard(text, targetService) {
        navigator.clipboard.writeText(text).then(() => {
            alert(`📋 Protocol redirection locked by browser container.\n\nNote copied instead! Go ahead and paste into ${targetService}.`);
        }).catch(() => {
            const textArea = document.createElement("textarea");
            textArea.value = text; document.body.appendChild(textArea);
            textArea.select(); document.execCommand('copy');
            document.body.removeChild(textArea);
            alert(`📋 Saved backup text to device clipboard for ${targetService}!`);
        });
    }

    function shareViaEmail() {
        const title = document.getElementById('noteTitle').value || 'Note Summary';
        const noteText = getCleanNoteText();
        const mailtoUrl = `mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent(noteText)}`;
        const syncWindow = window.open(mailtoUrl, '_blank');
        if (!syncWindow || syncWindow.closed || typeof syncWindow === 'undefined') { fallbackCopyToClipboard(noteText, "your Email app"); }
    }

    function shareViaWhatsApp() {
        const noteText = getCleanNoteText();
        const whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(noteText)}`;
        const syncWindow = window.open(whatsappUrl, '_blank');
        if (!syncWindow) { fallbackCopyToClipboard(noteText, "WhatsApp"); }
    }

    /* Calculator Mechanics */
    let calcExpression = "";
    function toggleCalculator() { document.getElementById('calcWidget').classList.toggle('active'); }
    function inputCalcNum(num) {
        const screen = document.getElementById('calcScreen');
        if (screen.innerText === "0" && num !== ".") calcExpression = "";
        calcExpression += num; screen.innerText = calcExpression;
    }
    function inputCalcOp(op) { calcExpression += " " + op + " "; document.getElementById('calcScreen').innerText = calcExpression; }
    function clearCalc() { calcExpression = ""; document.getElementById('calcScreen').innerText = "0"; }
    function calculateResult() {
        try {
            const result = Function('"use strict";return (' + calcExpression + ')')();
            document.getElementById('calcScreen').innerText = result; calcExpression = result.toString();
        } catch (e) { document.getElementById('calcScreen').innerText = "Error"; calcExpression = ""; }
    }

    /* Attachments Utilities */
    function triggerImageAttachment() { alert("🖼️ Image entry attached."); appendAttachmentBadge('🖼️ Image_File.png'); }
    function triggerLinkAttachment() {
        const url = prompt("Enter hyperlink URL:", "https://");
        if(url && url !== "https://") appendAttachmentBadge(`🔗 Link: ${url}`);
    }
    function appendAttachmentBadge(label) {
        const container = document.getElementById('attachmentsContainer');
        const badge = document.createElement('span');
        badge.className = 'attachment-badge'; badge.innerText = label; container.appendChild(badge);
    }
    function renderAttachments(attachments) {
        const container = document.getElementById('attachmentsContainer'); container.innerHTML = '';
        attachments.forEach(att => appendAttachmentBadge(att));
    }

    function saveAndGoHome() {
        const title = document.getElementById('noteTitle').value.trim();
        const content = document.getElementById('noteContent').innerHTML;
        const date = document.getElementById('currentDateDisplay').textContent;
        const paperColor = document.getElementById('paperColorPicker').value;
        const fontColor = document.getElementById('fontColorPicker').value;

        let tempDiv = document.createElement('div');
        tempDiv.innerHTML = content;
        
        if (!title && !tempDiv.textContent.trim() && tempDiv.getElementsByTagName('table').length === 0) {
            switchView('homeView'); initHome(); return;
        }

        let attachmentsArray = [];
        document.querySelectorAll('.attachment-badge').forEach(el => attachmentsArray.push(el.innerText));

        const existingIndex = appState.notes.findIndex(n => n.id === appState.currentNoteId);
        const notePayload = {
            id: appState.currentNoteId, title: title || 'Untitled Note', content: content, date: date,
            attachments: attachmentsArray, paperColor: paperColor, fontColor: fontColor
        };

        if (existingIndex > -1) appState.notes[existingIndex] = notePayload;
        else appState.notes.unshift(notePayload);

        localStorage.setItem('sleek_notes_pro_v14', JSON.stringify(appState.notes));
        switchView('homeView'); initHome();
    }

    function deleteNote(event, id) {
        event.stopPropagation(); 
        if(confirm("Discard this note permanently?")) {
            appState.notes = appState.notes.filter(n => n.id !== id);
            localStorage.setItem('sleek_notes_pro_v14', JSON.stringify(appState.notes));
            initHome();
        }
    }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    window.onload = function() { initHome(); };
</script>
